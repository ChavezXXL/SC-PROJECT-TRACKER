        <style>
                /* Theme CSS variables */
                :root {

                  --bg-input: #09090b;

                }
                .light-theme {
                  --bg-body: #f4f4f5;
                  --bg-surface: rgba(255,255,255,0.8);
                  --bg-elevated: #ffffff;
                  --bg-input: #ffffff;

                  --text-secondary: #52525b;
                  --text-muted: #a1a1aa;

                }
                /* Light mode overrides for Tailwind classes */
                .light-theme { background-color: var(--bg-body) !important; color: var(--text-primary) !important; }
                .light-theme .bg-zinc-950 { background-color: var(--bg-body) !important; }
                .light-theme .bg-zinc-900\/50, .light-theme .bg-zinc-900\/30 { background-color: var(--bg-surface) !important; }
                .light-theme .bg-zinc-900 { background-color: var(--bg-elevated) !important; }

                .light-theme .text-zinc-100, .light-theme .text-white { color: #18181b !important; }
                .light-theme .text-zinc-300 { color: #3f3f46 !important; }
                .light-theme .text-zinc-400 { color: #52525b !important; }
                .light-theme .text-zinc-500 { color: #71717a !important; }
                .light-theme .text-zinc-600 { color: #a1a1aa !important; }
                .light-theme .border-white\/5, .light-theme .border-white\/10 { border-color: var(--border-color) !important; }
                .light-theme .divide-white\/5 > * + * { border-color: var(--border-color) !important; }
                .light-theme .hover\:bg-white\/5:hover { background-color: rgba(0,0,0,0.03) !important; }
                .light-theme .hover\:bg-white\/10:hover { background-color: rgba(0,0,0,0.06) !important; }
                .light-theme .bg-white\/5 { background-color: rgba(0,0,0,0.03) !important; }
                .light-theme .bg-white\/10 { background-color: rgba(0,0,0,0.06) !important; }
                .light-theme .shadow-lg { box-shadow: 0 10px 25px rgba(0,0,0,0.08) !important; }
                .light-theme .shadow-2xl { box-shadow: 0 20px 50px rgba(0,0,0,0.12) !important; }
                /* Keep accent colors visible in light mode */
                .light-theme .text-emerald-400 { color: #059669 !important; }
                .light-theme .text-blue-400, .light-theme .text-blue-500 { color: #2563eb !important; }
                .light-theme .text-red-400 { color: #dc2626 !important; }

        <script type="importmap">
                {

        <link rel="stylesheet" href="/index.css">
        <!-- Google Calendar Integration -->
        <script src="https://apis.google.com/js/api.js"></script>
        <script src="https://accounts.google.com/gsi/client"></script>
        <script>
                window.__GCAL_CLIENT_ID = '29160179130-j9ifloafat4v2u50f9m15niis85dot58.apps.googleusercontent.com';
                window.__gcalTokenClient = null;
                window.__gcalReady = false;

                window.__requestCalendarAccess = function(callback) {
                          try {
                                      if (typeof google === 'undefined') { callback(false, 'GIS not loaded'); return; }
                                      if (!window.__gcalTokenClient) {
                                                    window.__gcalTokenClient = google.accounts.oauth2.initTokenClient({
                                                                    client_id: window.__GCAL_CLIENT_ID,
                                                                    scope: 'https://www.googleapis.com/auth/calendar.events',
                                                                    callback: function(response) {
                                                                                      if (response.error) { callback(false, response.error); return; }
                                                                                      gapi.load('client', async function() {
                                                                                                          try {
                                                                                                                        await gapi.client.load('https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest');
                                                                                                                        gapi.client.setToken({ access_token: response.access_token });
                                                                                                                        window.__gcalReady = true;
                                                                                                                        callback(true, null);
                                                                                                          } catch(e) { callback(false, e.message); }
                                                                                      });
                                                                    }
                                                    });
                                      }
                                      window.__gcalTokenClient.requestAccessToken({ prompt: '' });
                          } catch(e) { callback(false, e.message); }
                };
        </script>
        <!-- Register Service Worker -->
        <script>
                if ('serviceWorker' in navigator) {
                          window.addEventListener('load', () => {
                                      navigator.serviceWorker.register('/sw.js')
                                                    .then(reg => console.log('SW registered:', reg.scope))
                                                    .catch(err => console.log('SW registration failed:', err));
                          });
                }
