[build]
  publish = "dist"
  command = "npm run build"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Cache hashed assets for 1 year (Vite fingerprints filenames on every build)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Content-Type = "application/javascript"
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "no-cache"

# Cache index.html for 5 minutes — picks up new deploys quickly
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

